<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask a Question</title>
    <style>
        /* Global Styles */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h1 {
            font-size: 2.5em;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Form Container */
        .container {
            width: 100%;
            max-width: 800px; /* Increased max width */
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        /* Form Styles */
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input[type="text"] {
            padding: 15px;
            font-size: 1em;
            border: 2px solid #dcdde1;
            border-radius: 5px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #3498db;
        }

        button {
            background-color: #3498db;
            color: #fff;
            padding: 15px;
            font-size: 1.2em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* Spinner Styles */
        #spinner {
            display: none;
            margin: 20px auto;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Result Display */
        #result {
            margin-top: 20px;
            font-size: 1.1em;
        }

        #result p {
            margin: 10px 0;
        }

        .error {
            color: #e74c3c;
        }

        .success {
            color: #27ae60;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            button {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Literature Insights through Multi-Folder Analysis</h1>
        <form id="questionForm">
            <input type="text" name="question" placeholder="Enter your question here..." required>
            <button type="submit">Explore</button>
        </form>

        <!-- Spinner while loading -->
        <div id="spinner"></div>

        <!-- Result Display -->
        <div id="result"></div>
    </div>

    <script>
        const form = document.getElementById('questionForm');
        const spinner = document.getElementById('spinner');
        const resultDiv = document.getElementById('result');

        form.onsubmit = async (event) => {
            event.preventDefault();
            spinner.style.display = 'block';  // Show spinner while loading
            resultDiv.innerHTML = '';  // Clear previous results

            const formData = new FormData(form);
            const response = await fetch('/ask', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            spinner.style.display = 'none';  // Hide spinner once loaded

            if (data.error) {
                resultDiv.innerHTML = `<p class="error">Error: ${data.error}</p>`;
            } else {
                resultDiv.innerHTML = `<p class="success">Answer: ${data.answer}</p><p>Sources: ${data.sources}</p>`;
            }
        };
    </script>

</body>
</html>
